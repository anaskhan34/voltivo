<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title -->
    <title>Voltivo | Buy Smartphones & Tech Products Online in Pakistan</title>

    <!-- SEO Meta -->
    <meta
      name="description"
      content="Voltivo is Pakistan's modern online shopping store for smartphones, gadgets, and premium tech products. Fast delivery, secure payments, and best prices."
    />

    <meta
      name="keywords"
      content="Voltivo, smartphones Pakistan, buy mobiles online, iPhone Pakistan, Android phones, tech store Pakistan, online shopping Pakistan, ecommerce store"
    />

    <meta name="author" content="Voltivo" />
    <meta name="robots" content="index, follow" />
    <meta name="language" content="English" />
    <meta name="revisit-after" content="7 days" />
    <meta name="theme-color" content="#0f172a" />

    <!-- Canonical -->
    <link rel="canonical" href="https://voltivo.netlify.app/" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/images/icon.png" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />

    <meta property="og:url" content="https://voltivo.netlify.app/" />

    <meta
      property="og:title"
      content="Voltivo | Buy Smartphones Online in Pakistan"
    />

    <meta
      property="og:description"
      content="Shop premium smartphones and gadgets online with Voltivo. Secure checkout, fast delivery, and affordable prices."
    />

    <meta
      property="og:image"
      content="https://voltivo.netlify.app/preview.png"
    />

    <meta property="og:site_name" content="Voltivo" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />

    <meta name="twitter:title" content="Voltivo Online Store" />

    <meta
      name="twitter:description"
      content="Discover premium smartphones and accessories online at Voltivo."
    />

    <meta
      name="twitter:image"
      content="https://voltivo.netlify.app/preview.png"
    />

    <!-- Schema Markup -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Store",
        "name": "Voltivo",
        "url": "https://voltivo.netlify.app/",
        "logo": "https://voltivo.netlify.app/images/icon.png",
        "image": "https://voltivo.netlify.app/preview.png",
        "description": "Voltivo is an online shopping store in Pakistan offering smartphones, gadgets, and tech accessories.",
        "address": {
          "@type": "PostalAddress",
          "addressCountry": "PK"
        },
        "sameAs": []
      }
    </script>
  </head>

  <body>
    <!-- SEO Fallback Content -->
    <noscript>
      Voltivo is an online shopping store for smartphones and tech gadgets in
      Pakistan.
    </noscript>

    <div id="root"></div>

    <!-- Main Script -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
